# Fault Scenario 01: Redis Credential Expiry
# Simulates key rotation where the app still has old/wrong credentials
#
# What breaks: Redis authentication fails, app enters degraded mode
# Alerts that fire: Redis Connection Errors, Probe Failures, Pods Not Ready
# SRE Agent should: Identify WRONGPASS errors in logs, correlate with Redis secret,
#                   suggest rotating the Kubernetes secret with current Redis keys
#
# Apply:   ./scripts/inject-fault.sh 1 <redis-host>
# Restore: ./scripts/restore.sh <resource-group> <redis-name>
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: aks-journal-app
type: Opaque
stringData:
  REDIS_HOST: "${REDIS_HOST}"
  REDIS_PORT: "6380"
  REDIS_PASSWORD: "WRONG_EXPIRED_KEY_12345"
