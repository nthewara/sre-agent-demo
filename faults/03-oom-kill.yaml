# Fault Scenario 03: OOM Kill
# Deploys the app with extremely low memory limits (20Mi) causing OOMKill
#
# What breaks: Node.js process exceeds 20Mi and gets killed by kernel
# Alerts that fire: OOMKilled, Pod Restarts, BackOff Events, Pods Not Ready
# SRE Agent should: Find OOMKilled events, check container memory usage,
#                   recommend increasing memory limits
#
# Apply:   kubectl apply -f faults/03-oom-kill.yaml
# Restore: kubectl apply -f k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-journal
  namespace: aks-journal-app
  labels:
    app: aks-journal
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aks-journal
  template:
    metadata:
      labels:
        app: aks-journal
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aks-journal
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: journal
          image: ${AZURE_CONTAINER_REGISTRY}/aks-journal:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: journal-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "10Mi"
              cpu: "100m"
            limits:
              memory: "20Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
